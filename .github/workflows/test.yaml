---
name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bats:
    name: Bats unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bats jq

      - name: Run bats tests
        run: bats tests/

  smoke:
    name: Image smoke test (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build wrapper image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: ./fiestaboard
          file: ./fiestaboard/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          build-args: |
            BUILD_FROM=fiestaboard/fiestaboard:5.6.0
            BUILD_ARCH=amd64
            BUILD_VERSION=ci
          tags: fiestaboard-ha-app:ci

      - name: Smoke-test the wrapper shim
        # We don't try to fully boot the upstream FiestaBoard stack in CI
        # (it expects a Home Assistant Supervisor context). Instead we
        # exercise the wrapper end-to-end: run ha-run.sh inside the built
        # image with a stub command and confirm it applies options and
        # exec's the trailing argv. Persistent /app/data is provided here
        # via a bind mount, mirroring how HA Supervisor will mount it from
        # the `map: { type: addon_config, path: /app/data }` directive.
        run: |
          set -e
          mkdir -p /tmp/data /tmp/app-data
          cat > /tmp/data/options.json <<'JSON'
          {
            "board_api_mode": "local",
            "board_host": "192.168.1.50",
            "log_level": "debug",
            "mqtt_enabled": false
          }
          JSON

          out="$(docker run --rm \
            -v /tmp/data:/data \
            -v /tmp/app-data:/app/data \
            --entrypoint /usr/local/bin/ha-run.sh \
            fiestaboard-ha-app:ci \
            /bin/sh -c 'echo BOARD_HOST=$BOARD_HOST; echo LOG_LEVEL=$LOG_LEVEL; echo MQTT_ENABLED=$MQTT_ENABLED')"

          echo "$out"
          echo "$out" | grep -q "^BOARD_HOST=192.168.1.50$"
          echo "$out" | grep -q "^LOG_LEVEL=debug$"
          echo "$out" | grep -q "^MQTT_ENABLED=false$"
