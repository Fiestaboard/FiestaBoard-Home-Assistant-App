---
name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bats:
    name: Bats unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bats jq

      - name: Run bats tests
        run: bats tests/

  smoke:
    name: Image smoke test (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build wrapper image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: ./fiestaboard
          file: ./fiestaboard/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          build-args: |
            BUILD_FROM=fiestaboard/fiestaboard:5.6.0
            BUILD_ARCH=amd64
            BUILD_VERSION=ci
          tags: fiestaboard-ha-app:ci

      - name: Run container
        run: |
          docker run -d --rm \
            --name fb-ha-app \
            -e SUPERVISOR_TOKEN= \
            -p 3000:3000 \
            fiestaboard-ha-app:ci

      - name: Wait for /api/health
        run: |
          set -e
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000/api/health >/dev/null 2>&1; then
              echo "ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::container did not become healthy within 60s"
          docker logs fb-ha-app || true
          exit 1

      - name: Container logs
        if: always()
        run: docker logs fb-ha-app || true

      - name: Stop container
        if: always()
        run: docker stop fb-ha-app || true
