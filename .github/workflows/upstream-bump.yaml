---
name: Upstream bump

# Polls the upstream FiestaBoard repo for new releases, opens a PR
# bumping the pinned base image plus the add-on version (mirroring
# upstream as `<upstream>-ha.N`), and squash-merges it in the same job.
# We can't use Dependabot's docker watcher because the real per-arch
# pin lives in fiestaboard/build.yaml (a Home Assistant builder spec)
# which Dependabot doesn't parse.
#
# `main` has no required reviews or status checks, so the merge lands
# immediately. CI (`lint`/`test`) runs on the post-merge `push`, not on
# the PR — broken bumps will turn `main` red rather than being blocked.
#
# Auth: PR creation and the squash-merge use `BUMP_PAT` (a fine-grained
# PAT scoped to this repo, Contents+PRs: write) rather than the default
# `GITHUB_TOKEN`. GitHub Actions deliberately suppresses workflow runs
# for events whose push was made by `GITHUB_TOKEN`; using a PAT makes
# the merge push look like a real user so the `Builder` workflow fires
# and publishes the new image. If `BUMP_PAT` is missing/expired the
# workflow fails fast at the merge step rather than silently regressing
# to the no-Builder-run state that left 7.0.7-ha.1 unpublished.
on:
  schedule:
    # Hourly. Idempotent: only acts when upstream actually changed.
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "Force a specific upstream version (e.g. 6.14.0). Leave empty to use latest."
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Determine current and latest versions
        id: versions
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          current_upstream="$(grep -E '^\s*amd64:\s*fiestaboard/fiestaboard:' fiestaboard/build.yaml \
            | sed -E 's/.*fiestaboard:([^ ]+).*/\1/')"
          if [ -n "${FORCE_VERSION}" ]; then
            latest_upstream="${FORCE_VERSION}"
          else
            latest_upstream="$(gh api repos/Fiestaboard/FiestaBoard/releases/latest --jq '.tag_name' \
              | sed 's/^v//')"
          fi
          # New upstream → reset the -ha.N revision to 1. Manual add-on-only
          # fixes bump the -ha.N counter outside this workflow.
          new_addon_version="${latest_upstream}-ha.1"
          {
            echo "current_upstream=${current_upstream}"
            echo "latest_upstream=${latest_upstream}"
            echo "new_addon_version=${new_addon_version}"
          } >> "$GITHUB_OUTPUT"
          if [ "${current_upstream}" = "${latest_upstream}" ]; then
            echo "needs_bump=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_bump=true"  >> "$GITHUB_OUTPUT"
          fi

      - name: Close stale bump PRs
        # Older bump PRs rot once main moves — `config.yaml` and CHANGELOG.md
        # conflict, auto-merge stalls. Close them before opening the new one
        # so only the current target branch is live.
        if: steps.versions.outputs.needs_bump == 'true'
        env:
          GH_TOKEN: ${{ secrets.BUMP_PAT }}
          KEEP_BRANCH: upstream/fiestaboard-${{ steps.versions.outputs.latest_upstream }}
        run: |
          set -euo pipefail
          gh pr list \
            --label upstream \
            --state open \
            --json number,headRefName \
            --jq ".[] | select(.headRefName | startswith(\"upstream/fiestaboard-\")) | select(.headRefName != \"${KEEP_BRANCH}\") | .number" \
          | while read -r pr; do
              [ -z "${pr}" ] && continue
              echo "Closing stale bump PR #${pr}"
              gh pr close "${pr}" --delete-branch \
                --comment "Superseded by bump to ${{ steps.versions.outputs.latest_upstream }}."
            done

      - name: Bump pinned files
        if: steps.versions.outputs.needs_bump == 'true'
        env:
          CURRENT: ${{ steps.versions.outputs.current_upstream }}
          LATEST: ${{ steps.versions.outputs.latest_upstream }}
          NEW_ADDON_VERSION: ${{ steps.versions.outputs.new_addon_version }}
        run: |
          set -euo pipefail
          sed -i "s|fiestaboard/fiestaboard:${CURRENT}|fiestaboard/fiestaboard:${LATEST}|g" \
            fiestaboard/build.yaml fiestaboard/Dockerfile
          sed -i -E "s|^version:.*|version: \"${NEW_ADDON_VERSION}\"|" fiestaboard/config.yaml
          today="$(date -u +%Y-%m-%d)"
          tmp="$(mktemp)"
          {
            head -n 5 fiestaboard/CHANGELOG.md
            printf '\n## %s — %s\n\n### Changed\n\n- Bump upstream FiestaBoard **%s → %s**.\n' \
              "${NEW_ADDON_VERSION}" "${today}" "${CURRENT}" "${LATEST}"
            tail -n +6 fiestaboard/CHANGELOG.md
          } > "${tmp}"
          mv "${tmp}" fiestaboard/CHANGELOG.md

      - name: Open PR
        if: steps.versions.outputs.needs_bump == 'true'
        id: pr
        uses: peter-evans/create-pull-request@v8
        with:
          # PAT (not GITHUB_TOKEN) so the branch push that lands the
          # merge commit triggers `Builder`. See header comment.
          token: ${{ secrets.BUMP_PAT }}
          branch: upstream/fiestaboard-${{ steps.versions.outputs.latest_upstream }}
          base: main
          title: "feat: bump upstream FiestaBoard to ${{ steps.versions.outputs.latest_upstream }}"
          commit-message: |
            feat: bump upstream FiestaBoard ${{ steps.versions.outputs.current_upstream }} → ${{ steps.versions.outputs.latest_upstream }}
          body: |
            Automated hourly bump from the **Upstream bump** workflow.

            Updates `fiestaboard/build.yaml` (both arches), `fiestaboard/Dockerfile`'s
            `BUILD_FROM` default, `fiestaboard/config.yaml`'s `version:`, and prepends
            a `CHANGELOG.md` entry.

            This PR is squash-merged immediately by the same workflow job,
            after which `Builder` publishes
            `fiestaboard/fiestaboard-ha-app:${{ steps.versions.outputs.new_addon_version }}`.

            Upstream release notes:
            https://github.com/Fiestaboard/FiestaBoard/releases/tag/v${{ steps.versions.outputs.latest_upstream }}

            **Skim before merge** — revert or amend if a new `FIESTABOARD_*` env var
            or renamed option needs to be wired into `config.yaml`,
            `rootfs/usr/local/bin/ha-run.sh`, and `tests/ha-run.bats`.
          labels: |
            dependencies
            upstream

      - name: Merge PR
        if: |
          steps.versions.outputs.needs_bump == 'true' &&
          steps.pr.outputs.pull-request-number
        env:
          # PAT (not GITHUB_TOKEN) so the merge push fires `Builder`.
          # See header comment.
          GH_TOKEN: ${{ secrets.BUMP_PAT }}
          PR_NUMBER: ${{ steps.pr.outputs.pull-request-number }}
        run: |
          gh pr merge --squash --delete-branch "${PR_NUMBER}"
