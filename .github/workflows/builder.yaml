---
name: Builder

on:
  push:
    branches: [main]
    paths:
      - "fiestaboard/**"
      - ".github/workflows/builder.yaml"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish (e.g. 0.1.0). Defaults to config.yaml."
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  init:
    name: Initialize build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.info.outputs.version }}
      publish: ${{ steps.publish.outputs.publish }}
    steps:
      - uses: actions/checkout@v4

      - name: Get add-on info
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: ./fiestaboard

      - name: Decide whether to publish
        id: publish
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "${DOCKERHUB_TOKEN}" ] && \
             { [ "${{ github.event_name }}" = "release" ] || \
               [ "${{ github.event_name }}" = "workflow_dispatch" ] || \
               [ "${{ github.ref }}" = "refs/heads/main" ]; }; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.arch }}
    needs: init
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, amd64]
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        if: needs.init.outputs.publish == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build add-on (${{ matrix.arch }})
        # The image name comes from config.yaml's `image:` field. We
        # intentionally do NOT pass --image or --docker-hub here: the
        # builder script's --image flag overrides the *unqualified* image
        # part only, so passing "fiestaboard/fiestaboard-ha-app" caused
        # it to construct fiestaboard/fiestaboard/fiestaboard-ha-app at
        # push time. The builder also runs its own docker login inside
        # the build container, so we forward DOCKER_USER/DOCKER_PASSWORD
        # for the publish path. (The docker/login-action above is still
        # useful for any same-host pulls.)
        uses: home-assistant/builder@2026.03.2
        with:
          args: >-
            --${{ matrix.arch }}
            --target /data/fiestaboard
            --version "${{ needs.init.outputs.version }}"
            ${{ needs.init.outputs.publish == 'true'
                && format('--docker-user {0} --docker-password {1}',
                          secrets.DOCKERHUB_USERNAME, secrets.DOCKERHUB_TOKEN)
                || '--test' }}
