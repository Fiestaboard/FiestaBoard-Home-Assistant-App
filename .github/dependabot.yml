---
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions

  # Upstream FiestaBoard bumps are handled by .github/workflows/upstream-bump.yaml.
  # The real per-arch pin lives in fiestaboard/build.yaml (a Home Assistant
  # builder spec), which Dependabot's docker ecosystem does not parse.
