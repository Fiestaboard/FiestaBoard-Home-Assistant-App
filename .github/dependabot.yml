---
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions

  # Upstream FiestaBoard bumps are handled by .github/workflows/upstream-bump.yaml.
  # The pin lives in fiestaboard/Dockerfile's `ARG BUILD_FROM` default (the
  # FROM line is `FROM ${BUILD_FROM}`), which Dependabot's docker ecosystem
  # does not parse.
