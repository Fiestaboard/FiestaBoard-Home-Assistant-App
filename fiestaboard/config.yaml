# https://developers.home-assistant.io/docs/apps/configuration#app-configuration
name: FiestaBoard
version: "0.1.0"
slug: fiestaboard
description: Open-source self-hosted platform for controlling Vestaboard split-flap displays
url: "https://github.com/Fiestaboard/FiestaBoard-Home-Assistant-App/tree/main/fiestaboard"
arch:
  - aarch64
  - amd64

# FiestaBoard's upstream image already declares ENTRYPOINT (/app/entrypoint.sh)
# and runs supervisord internally. We do NOT use s6-overlay; the wrapper
# script just exports HA options as env vars and execs the upstream entrypoint.
init: false

# When the multi-arch image is published to Docker Hub, uncomment the line
# below so HA Supervisor pulls it instead of building locally:
#
#   image: "fiestaboard/fiestaboard-ha-app"
#
# Until then, omitting `image` makes Supervisor build the wrapper from this
# directory's Dockerfile on the host, which is what you want for development
# and pre-release testing. Build args (BUILD_FROM per arch, etc.) come from
# build.yaml in this same directory.

# Boot behaviour
boot: auto
startup: services

# Sidebar / Ingress integration
ingress: true
ingress_port: 3000
panel_icon: mdi:billboard
panel_title: FiestaBoard

# Direct host port for mDNS / `.local` access from other devices on the LAN.
# FiestaBoard's UI listens on container port 3000; we map it to 4420 on the host
# (the default port used by the standalone Docker image).
ports:
  "3000/tcp": 4420
ports_description:
  "3000/tcp": Web UI (also reachable via Ingress; this exposes it on the LAN for mDNS)

# Persistent data:
#   - /data            -> Home Assistant's per-add-on data dir. Holds
#                         options.json (user-facing options) and any state
#                         our wrapper writes. Always present, always backed up.
#   - /addon_configs/<slug> -> HA's persistent add-on config dir. We mount
#                              this directly at /app/data so FiestaBoard's
#                              upstream VOLUME stays writable AND its contents
#                              are captured in HA snapshots.
map:
  - type: addon_config
    read_only: false
    path: /app/data

# Auto-discover Home Assistant's MQTT broker (e.g. the Mosquitto add-on).
# `mqtt:want` means: bind if available, otherwise start without it.
services:
  - mqtt:want

# When a discovery message comes from MQTT, HA will route it to FiestaBoard.
discovery:
  - mqtt

# Allow FiestaBoard's `home_assistant` plugin to talk to HA core via the
# Supervisor proxy. The token is exposed as $SUPERVISOR_TOKEN inside the
# container; FiestaBoard reads HOME_ASSISTANT_BASE_URL=http://supervisor/core
# and HOME_ASSISTANT_ACCESS_TOKEN=$SUPERVISOR_TOKEN from our wrapper.
homeassistant_api: true

# User-facing options. The full set of FiestaBoard env vars is configurable
# via FiestaBoard's own web UI; only the bootstrap-critical values are
# surfaced here so users can get the board talking before opening the UI.
options:
  board_api_mode: local
  board_host: ""
  board_local_api_key: ""
  board_read_write_key: ""
  weather_provider: weatherapi
  weather_api_key: ""
  weather_location: ""
  timezone: ""
  mqtt_enabled: true
  fiestaboard_external_url: ""
  log_level: info

schema:
  board_api_mode: list(local|cloud)
  board_host: str?
  board_local_api_key: password?
  board_read_write_key: password?
  weather_provider: list(weatherapi|openweathermap)?
  weather_api_key: password?
  weather_location: str?
  timezone: str?
  mqtt_enabled: bool
  fiestaboard_external_url: url?
  log_level: list(debug|info|warning|error)?
